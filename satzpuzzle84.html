<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Assistent: Satz-Puzzle (ПО + Zahlwörter)</title>
    <!-- Polyfill für Drag-and-Drop auf Touch-Geräten -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --word-bg: #ebf3f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .explanation {
            background: #eef7fd;
            padding: 20px;
            border-left: 5px solid var(--secondary-color);
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .exercise-item {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
        }

        .instruction {
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        /* Puzzle Area */
        .puzzle-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 50px;
            padding: 15px;
            background: #fafafa;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .word-chip {
            background-color: var(--word-bg);
            border: 1px solid var(--secondary-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 1.1rem;
        }

        .word-chip:active {
            cursor: grabbing;
        }

        .word-chip.dragging {
            opacity: 0.5;
            transform: scale(0.9);
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-check { background-color: var(--secondary-color); color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-solution { background-color: #f39c12; color: white; }
        button:hover { opacity: 0.8; }

        .correct { border-color: var(--success-color) !important; background-color: #d4edda !important; color: #155724; }
        .incorrect { border-color: var(--error-color) !important; background-color: #f8d7da !important; color: #721c24; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .word-chip { font-size: 1rem; padding: 6px 12px; }
            .controls { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Assistent: Satz-Puzzle</h1>

    <div class="explanation">
        <h2>Anleitung</h2>
        <p>Bringe die Wörter in die richtige Reihenfolge, um grammatikalisch korrekte Sätze mit der Präposition <strong>ПО</strong> zu bilden. 
        Ziehe die Wort-Bausteine einfach an die richtige Stelle.</p>
        <p><em>Tipp: Achte auf die Großschreibung am Satzanfang und den Punkt am Ende!</em></p>
    </div>

    <div id="exercises-list">
        <!-- JS generiert hier die Aufgaben -->
    </div>
</div>

<script>
    const puzzleData = [
        { id: 1, correct: ["Мама", "дала", "детям", "по", "одной", "конфете."], scrambled: ["детям", "одной", "Мама", "по", "конфете.", "дала"] },
        { id: 2, correct: ["Мы", "купили", "по", "два", "билета", "на", "футбол."], scrambled: ["билета", "Мы", "два", "по", "купили", "футбол.", "на"] },
        { id: 3, correct: ["Студенты", "купили", "по", "семь", "тетрадей."], scrambled: ["купили", "семь", "Студенты", "тетрадей.", "по"] },
        { id: 4, correct: ["Бабушка", "дала", "внукам", "по", "одному", "яблоку."], scrambled: ["яблоку.", "дала", "по", "Бабушка", "одному", "внукам"] },
        { id: 5, correct: ["Мы", "заказали", "по", "три", "пиццы."], scrambled: ["три", "Мы", "пиццы.", "заказали", "по"] },
        { id: 6, correct: ["Каждый", "гость", "получил", "по", "одному", "подарку."], scrambled: ["подарку.", "получил", "гость", "по", "одному", "Каждый"] },
        { id: 7, correct: ["Туристы", "обменяли", "по", "пятьдесят", "долларов."], scrambled: ["долларов.", "обменяли", "Туристы", "по", "пятьдесят"] },
        { id: 8, correct: ["Мама", "дала", "детям", "по", "два", "пирожка."], scrambled: ["детям", "пирожка.", "по", "дала", "два", "Мама"] },
        { id: 9, correct: ["Дайте", "нам", "по", "три", "чашки", "чая."], scrambled: ["три", "нам", "Дайте", "чашки", "по", "чая."] },
        { id: 10, correct: ["Ученики", "получили", "по", "одному", "рисунку."], scrambled: ["рисунку.", "получили", "Ученики", "одному", "по"] }
    ];

    function initExercises() {
        const list = document.getElementById('exercises-list');
        puzzleData.forEach((data, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'exercise-item';
            itemDiv.id = `ex-${data.id}`;

            itemDiv.innerHTML = `
                <span class="instruction">Aufgabe ${index + 1}: Ordne den Satz</span>
                <div class="puzzle-container" id="container-${data.id}" ondragover="handleDragOver(event)">
                    ${data.scrambled.map(word => `<div class="word-chip" draggable="true" ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">${word}</div>`).join('')}
                </div>
                <div class="controls">
                    <button class="btn-check" onclick="checkSentence(${data.id})">Überprüfen</button>
                    <button class="btn-reset" onclick="resetSentence(${data.id})">Zurücksetzen</button>
                    <button class="btn-solution" onclick="showSolution(${data.id})">Lösung anzeigen</button>
                </div>
            `;
            list.appendChild(itemDiv);
        });
    }

    // Drag & Drop Logic
    let draggingElement = null;

    function handleDragStart(e) {
        draggingElement = e.target;
        e.target.classList.add('dragging');
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        draggingElement = null;
    }

    function handleDragOver(e) {
        e.preventDefault();
        const container = e.currentTarget;
        const afterElement = getDragAfterElement(container, e.clientX, e.clientY);
        if (afterElement == null) {
            container.appendChild(draggingElement);
        } else {
            container.insertBefore(draggingElement, afterElement);
        }
    }

    function getDragAfterElement(container, x, y) {
        const draggableElements = [...container.querySelectorAll('.word-chip:not(.dragging)')];

        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offsetX = x - box.left - box.width / 2;
            const offsetY = y - box.top - box.height / 2;
            // Wir prüfen primär X, aber Y hilft bei Zeilenumbrüchen
            if (Math.abs(offsetY) < box.height && offsetX < 0 && offsetX > closest.offset) {
                return { offset: offsetX, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // App Logic
    function checkSentence(id) {
        const container = document.getElementById(`container-${id}`);
        const chips = [...container.querySelectorAll('.word-chip')];
        const userOrder = chips.map(c => c.innerText);
        const correctOrder = puzzleData.find(d => d.id === id).correct;

        const isCorrect = JSON.stringify(userOrder) === JSON.stringify(correctOrder);

        chips.forEach((chip, index) => {
            chip.classList.remove('correct', 'incorrect');
            if (chip.innerText === correctOrder[index]) {
                chip.classList.add('correct');
            } else {
                chip.classList.add('incorrect');
            }
        });
    }

    function resetSentence(id) {
        const container = document.getElementById(`container-${id}`);
        const data = puzzleData.find(d => d.id === id);
        container.innerHTML = data.scrambled.map(word => `<div class="word-chip" draggable="true" ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">${word}</div>`).join('');
    }

    function showSolution(id) {
        const container = document.getElementById(`container-${id}`);
        const data = puzzleData.find(d => d.id === id);
        container.innerHTML = data.correct.map(word => `<div class="word-chip correct" draggable="true" ondragstart="handleDragStart(event)" ondragend="handleDragEnd(event)">${word}</div>`).join('');
    }

    window.onload = initExercises;
</script>

</body>
</html>
