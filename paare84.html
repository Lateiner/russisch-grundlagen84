<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Assistent: Paare finden (ПО + Zahlwörter)</title>
    <!-- Polyfill für Touch-Geräte -->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --tile-bg: #ffffff;
            --tile-selected: #d1ecf1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .explanation {
            background: #eef7fd;
            padding: 20px;
            border-left: 5px solid var(--secondary-color);
            margin-bottom: 30px;
            border-radius: 4px;
        }

        /* Spielfeld */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            min-height: 300px;
        }

        .tile {
            background-color: var(--tile-bg);
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 1.1rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-style: normal; /* Keine Kursivschrift */
        }

        .tile:hover {
            border-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .tile.selected {
            background-color: var(--tile-selected);
            border-color: var(--secondary-color);
        }

        /* Gefundene Paare verschwinden */
        .tile.matched {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.8);
        }

        .tile.incorrect {
            background-color: #f8d7da;
            border-color: var(--error-color);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Lösungsfarben für Paare */
        .pair-0 { background-color: #FFEB3B !important; color: #000; border-color: #FBC02D; visibility: visible !important; opacity: 1 !important; }
        .pair-1 { background-color: #FF9800 !important; color: #fff; border-color: #E65100; visibility: visible !important; opacity: 1 !important; }
        .pair-2 { background-color: #E91E63 !important; color: #fff; border-color: #AD1457; visibility: visible !important; opacity: 1 !important; }
        .pair-3 { background-color: #9C27B0 !important; color: #fff; border-color: #6A1B9A; visibility: visible !important; opacity: 1 !important; }
        .pair-4 { background-color: #3F51B5 !important; color: #fff; border-color: #283593; visibility: visible !important; opacity: 1 !important; }
        .pair-5 { background-color: #03A9F4 !important; color: #fff; border-color: #0277BD; visibility: visible !important; opacity: 1 !important; }
        .pair-6 { background-color: #009688 !important; color: #fff; border-color: #00695C; visibility: visible !important; opacity: 1 !important; }
        .pair-7 { background-color: #8BC34A !important; color: #000; border-color: #558B2F; visibility: visible !important; opacity: 1 !important; }
        .pair-8 { background-color: #795548 !important; color: #fff; border-color: #4E342E; visibility: visible !important; opacity: 1 !important; }
        .pair-9 { background-color: #607D8B !important; color: #fff; border-color: #37474F; visibility: visible !important; opacity: 1 !important; }

        /* Buttons */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        .btn-reset { background-color: #95a5a6; color: white; }
        .btn-solution { background-color: #f39c12; color: white; }
        button:hover { opacity: 0.9; }

        .status-msg {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            min-height: 30px;
        }

        @media (max-width: 600px) {
            .memory-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .tile { font-size: 0.95rem; min-height: 60px; padding: 10px; }
            .container { padding: 15px; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Paare finden: ПО + Zahlwörter</h1>

    <div class="explanation">
        <p>Klicken Sie zwei zusammengehörige Kacheln an (Zahlwort + passendes Substantiv). 
        Korrekte Paare verschwinden vom Feld.</p>
        <p><em>Beispiel: по одному ↔ билету</em></p>
    </div>

    <div class="memory-grid" id="gameGrid"></div>

    <div class="status-msg" id="statusMsg"></div>

    <div class="controls">
        <button class="btn-reset" onclick="initGame()">Neu starten</button>
        <button class="btn-solution" onclick="showSolution()">Lösungen farbig anzeigen</button>
    </div>
</div>

<script>
    const pairs = [
        { a: "по одному", b: "билету", id: 0 },
        { a: "по одной", b: "конфете", id: 1 },
        { a: "по два", b: "яблока", id: 2 },
        { a: "по две", b: "розы", id: 3 },
        { a: "по три", b: "банана", id: 4 },
        { a: "по четыре", b: "учебника", id: 5 },
        { a: "по пять", b: "конфет", id: 6 },
        { a: "по десять", b: "рублей", id: 7 },
        { a: "по двадцать одному", b: "рублю", id: 8 },
        { a: "по восемь", b: "тетрадей", id: 9 }
    ];

    let selectedTiles = [];
    let matchedPairs = 0;
    let isSolutionMode = false;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const grid = document.getElementById('gameGrid');
        const status = document.getElementById('statusMsg');
        grid.innerHTML = '';
        status.innerText = '';
        selectedTiles = [];
        matchedPairs = 0;
        isSolutionMode = false;

        let tilesData = [];
        pairs.forEach(p => {
            tilesData.push({ text: p.a, id: p.id });
            tilesData.push({ text: p.b, id: p.id });
        });

        shuffle(tilesData);

        tilesData.forEach((data, index) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = data.text;
            tile.dataset.id = data.id;
            tile.onclick = () => handleTileClick(tile);
            grid.appendChild(tile);
        });
    }

    function handleTileClick(tile) {
        if (isSolutionMode || tile.classList.contains('matched') || selectedTiles.includes(tile)) return;

        tile.classList.add('selected');
        selectedTiles.push(tile);

        if (selectedTiles.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        const [t1, t2] = selectedTiles;
        
        if (t1.dataset.id === t2.dataset.id) {
            // Treffer
            setTimeout(() => {
                t1.classList.replace('selected', 'matched');
                t2.classList.replace('selected', 'matched');
                matchedPairs++;
                selectedTiles = [];
                
                if (matchedPairs === pairs.length) {
                    document.getElementById('statusMsg').innerText = "Hervorragend! Alles gelöst.";
                    document.getElementById('statusMsg').style.color = "var(--success-color)";
                }
            }, 400);
        } else {
            // Fehler
            t1.classList.add('incorrect');
            t2.classList.add('incorrect');
            setTimeout(() => {
                t1.classList.remove('selected', 'incorrect');
                t2.classList.remove('selected', 'incorrect');
                selectedTiles = [];
            }, 800);
        }
    }

    function showSolution() {
        isSolutionMode = true;
        const status = document.getElementById('statusMsg');
        status.innerText = "Lösungsübersicht (Paare haben die gleiche Farbe)";
        status.style.color = "var(--primary-color)";

        document.querySelectorAll('.tile').forEach(tile => {
            tile.classList.remove('selected', 'incorrect', 'matched');
            const pairId = tile.dataset.id;
            tile.classList.add(`pair-${pairId}`);
        });
    }

    window.onload = initGame;
</script>

</body>
</html>
